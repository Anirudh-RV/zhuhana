services:
  algonexus:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-local
    container_name: algonexus-container
    ports:
      - "8012:8080"
    env_file:
      - ../env/local-env.env
    volumes:
      - ..:/app
    restart: unless-stopped
    depends_on:
      - algonexus-postgres
      - algonexus-redis

  algonexus-postgres:
    image: postgres:17
    container_name: algonexus-postgres-container
    env_file:
      - ../env/local-env.env
    volumes:
      - algonexus_pgdata:/var/lib/postgresql/data
    ports:
      - "5423:5432"
    restart: unless-stopped

  algonexus-redis:
    image: redis:7
    container_name: algonexus-redis-container
    command: ["redis-server", "--requirepass", "password"]
    ports:
      - "6350:6379"

volumes:
  algonexus_pgdata:
