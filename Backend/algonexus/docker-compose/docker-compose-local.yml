services:
  algonexus:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-local
    container_name: algonexus-container
    ports:
      - "8081:${PORT}"
    volumes:
      - ..:/app
    env_file:
      - ../env/local-env.env
    restart: unless-stopped
    depends_on:
      - algonexus-postgres
      - algonexus-redis
      - algonexus-clickhouse

  algonexus-postgres:
    image: postgres:17
    container_name: algonexus-postgres-container
    volumes:
      - algonexus_pgdata:/var/lib/postgresql/data
    ports:
      - "5422:${POSTGRES_PORT}"
    env_file:
      - ../env/local-env.env
    restart: unless-stopped

  algonexus-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: algonexus-clickhouse-container
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native client interface
    volumes:
      - algonexus_clickhouse_data:/var/lib/clickhouse
      - algonexus_clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_DB=algonexus
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=password
    restart: unless-stopped

  algonexus-tabix:
    image: spoonest/clickhouse-tabix-web-client:latest
    container_name: algonexus-tabix-container
    ports:
      - "8124:80"
    depends_on:
      - algonexus-clickhouse
    restart: unless-stopped

  algonexus-redis:
    image: redis:7
    container_name: algonexus-redis-container
    command: ["redis-server", "--requirepass", "password"]
    ports:
      - "6378:${REDIS_PORT}"

  algonexus-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: algonexus-zookeeper-container
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "10067:${ZOOKEEPER_PORT}"
    volumes:
      - algonexus_zookeeper_data:/var/lib/zookeeper/data
      - algonexus_zookeeper_datalog:/var/lib/zookeeper/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "${ZOOKEEPER_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5

  algonexus-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: algonexus-kafka-container
    depends_on:
      algonexus-zookeeper:
        condition: service_healthy
    ports:
      - "9199:${KAFKA_PORT}"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: algonexus-zookeeper:${ZOOKEEPER_PORT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://algonexus-kafka:${KAFKA_PORT}
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    volumes:
      - algonexus_kafka_data:/var/lib/kafka/data

volumes:
  algonexus_pgdata:
  algonexus_zookeeper_data:
  algonexus_zookeeper_datalog:
  algonexus_kafka_data:
  algonexus_clickhouse_data:
  algonexus_clickhouse_logs:
