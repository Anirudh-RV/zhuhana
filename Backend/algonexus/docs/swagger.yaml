definitions:
  models.OHLC:
    properties:
      close:
        type: number
      date_Time:
        type: string
      day:
        type: integer
      high:
        type: number
      low:
        type: number
      market:
        type: string
      month:
        type: integer
      open:
        type: number
      symbol:
        type: string
      volume:
        type: integer
      week:
        type: integer
      weekday:
        type: integer
      year:
        type: integer
    type: object
  models.OHLCRangeResponse:
    properties:
      next_page_no:
        type: integer
      ohlc_data:
        items:
          $ref: '#/definitions/models.OHLC'
        type: array
      page_limit:
        type: integer
      page_no:
        type: integer
      status:
        type: integer
      status_description:
        type: string
    type: object
info:
  contact: {}
paths:
  /v1/backtest/ohlc/range/:
    get:
      consumes:
      - application/json
      description: Retrieves OHLC (Open, High, Low, Close) data for a given symbol
        and market between the specified start and end times. Supports pagination.
      parameters:
      - description: Start time in RFC3339 format
        example: "2020-06-10T00:00:00Z"
        in: query
        name: start_time
        required: true
        type: string
      - description: End time in RFC3339 format
        example: "2020-06-15T00:00:00Z"
        in: query
        name: end_time
        required: true
        type: string
      - description: Symbol to retrieve OHLC data for
        example: SPY
        in: query
        name: symbol
        required: true
        type: string
      - description: Market for the symbol
        example: NYSEARCA
        in: query
        name: market
        required: true
        type: string
      - default: 50
        description: Number of results per page
        in: query
        minimum: 1
        name: page_limit
        type: integer
      - default: 1
        description: Page number to retrieve
        in: query
        minimum: 1
        name: page_no
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.OHLCRangeResponse'
        "400":
          description: Invalid time format or missing required query parameters
          schema:
            $ref: '#/definitions/models.OHLCRangeResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.OHLCRangeResponse'
      security:
      - ApiKeyAuth: []
      summary: Get OHLC data for a symbol within a date time range
      tags:
      - Backtest
swagger: "2.0"
