services:
  outbound:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-local
    container_name: outbound-container
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
    volumes:
      - ..:/app
    restart: unless-stopped
    depends_on:
      - outbound-redis

  outbound-redis:
    image: redis:7
    container_name: outbound-redis-container
    command: ["redis-server", "--requirepass", "password"]
    ports:
      - "6369:6379"
