services:
  usermodel:
    build:
      context: ..
    container_name: usermodel-container
    volumes:
      - ../:/app
    working_dir: /app
    ports:
      - "8008:8000"
    env_file:
      - ../env/local-env.env
    depends_on:
      - usermodel-postgres
    command: >
      sh -c "python manage.py migrate && gunicorn usermodel.wsgi:application --bind 0.0.0.0:8000"

  usermodel-postgres:
    image: postgres:17
    container_name: usermodel-postgres-container
    env_file:
      - ../env/local-env.env
    volumes:
      - usermodel_pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    restart: unless-stopped

volumes:
  usermodel_pgdata:
