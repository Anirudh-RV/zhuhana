services:
  governor:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-local
    container_name: governor-container
    ports:
      - "8008:8080"
    env_file:
      - ../env/local-env.env
    volumes:
      - ..:/app
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - governor-postgres
      - governor-redis

  governor-postgres:
    image: postgres:17
    container_name: governor-postgres-container
    env_file:
      - ../env/local-env.env
    volumes:
      - governor_pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    restart: unless-stopped

  governor-redis:
    image: redis:7
    container_name: governor-redis-container
    command: ["redis-server", "--requirepass", "password"]
    ports:
      - "6349:6379"

volumes:
  governor_pgdata:
