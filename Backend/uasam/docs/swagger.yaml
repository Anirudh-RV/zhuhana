definitions:
  models.SignUpInitRequest:
    properties:
      emailId:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      middleName:
        type: string
      password:
        type: string
    type: object
  models.SignUpInitResponse:
    properties:
      status:
        type: integer
      status_description:
        type: string
    type: object
info:
  contact: {}
paths:
  /v1/user/sign-up/init/:
    post:
      consumes:
      - application/json
      description: Initiates user sign-up by checking if the user exists and sending
        OTP for verification
      parameters:
      - description: Sign Up Init Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SignUpInitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP verification initiated
          schema:
            $ref: '#/definitions/models.SignUpInitResponse'
        "400":
          description: User already exists or invalid payload
          schema:
            $ref: '#/definitions/models.SignUpInitResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/models.SignUpInitResponse'
      summary: Initialize Sign Up
      tags:
      - User
swagger: "2.0"
