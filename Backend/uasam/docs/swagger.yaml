definitions:
  models.LoginVerifyOTPRequest:
    properties:
      emailId:
        type: string
      otp:
        type: string
    type: object
  models.LoginVerifyOTPResponse:
    properties:
      accessToken:
        type: string
      status:
        type: integer
      statusDescription:
        type: string
      user:
        $ref: '#/definitions/models.UserObject'
    type: object
  models.LoginVerifyPasswordRequest:
    properties:
      emailId:
        type: string
      password:
        type: string
    type: object
  models.LoginVerifyPasswordResponse:
    properties:
      status:
        type: integer
      statusDescription:
        type: string
    type: object
  models.SignUpInitRequest:
    properties:
      emailId:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      middleName:
        type: string
      password:
        type: string
    type: object
  models.SignUpInitResponse:
    properties:
      status:
        type: integer
      statusDescription:
        type: string
    type: object
  models.SignUpVerifyOTPRequest:
    properties:
      emailId:
        type: string
      otp:
        type: string
    type: object
  models.SignUpVerifyOTPResponse:
    properties:
      accessToken:
        type: string
      status:
        type: integer
      statusDescription:
        type: string
      user:
        $ref: '#/definitions/models.UserObject'
    type: object
  models.UserObject:
    properties:
      createdAt:
        type: string
      emailID:
        type: string
      firstName:
        type: string
      id:
        type: string
      lastName:
        type: string
      middleName:
        type: string
      updatedAt:
        type: string
    type: object
info:
  contact: {}
paths:
  /v1/user/login/verify-otp/:
    post:
      consumes:
      - application/json
      description: Verifies the OTP provided by the user and returns an access token
        upon successful authentication
      parameters:
      - description: Login Verify OTP Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginVerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login authenticated successfully, access token issued
          schema:
            $ref: '#/definitions/models.LoginVerifyOTPResponse'
        "400":
          description: Invalid request payload or login error
          schema:
            $ref: '#/definitions/models.SignUpVerifyOTPResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.LoginVerifyPasswordResponse'
      summary: Verify OTP during login
      tags:
      - User
  /v1/user/login/verify-password/:
    post:
      consumes:
      - application/json
      description: Checks if user exists and verifies the submitted password. Sends
        an OTP if the password verification is successful
      parameters:
      - description: Login Verify Password Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginVerifyPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password verified successfully, proceed to OTP verification
          schema:
            $ref: '#/definitions/models.LoginVerifyPasswordResponse'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/models.SignUpVerifyOTPResponse'
        "401":
          description: Login error due to invalid credentials or user not existing
          schema:
            $ref: '#/definitions/models.LoginVerifyPasswordResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.LoginVerifyPasswordResponse'
      summary: Verify user password during login
      tags:
      - User
  /v1/user/sign-up/init/:
    post:
      consumes:
      - application/json
      description: Initiates user sign-up by checking if the user exists and sending
        OTP for verification
      parameters:
      - description: Sign Up Init Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SignUpInitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP verification initiated
          schema:
            $ref: '#/definitions/models.SignUpInitResponse'
        "400":
          description: User already exists or invalid payload
          schema:
            $ref: '#/definitions/models.SignUpInitResponse'
        "500":
          description: Server error
          schema:
            $ref: '#/definitions/models.SignUpInitResponse'
      summary: Initialize Sign Up
      tags:
      - User
  /v1/user/sign-up/verify-otp/:
    post:
      consumes:
      - application/json
      description: Verifies the OTP and creates the user account if valid.
      parameters:
      - description: Verify OTP Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SignUpVerifyOTPRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.SignUpVerifyOTPResponse'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/models.SignUpVerifyOTPResponse'
        "401":
          description: Wrong OTP
          schema:
            $ref: '#/definitions/models.SignUpVerifyOTPResponse'
        "500":
          description: Server Error
          schema:
            $ref: '#/definitions/models.SignUpVerifyOTPResponse'
      summary: Verify OTP and Sign Up User
      tags:
      - User
swagger: "2.0"
