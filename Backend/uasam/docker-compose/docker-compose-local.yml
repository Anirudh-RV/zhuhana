services:
  uasam:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile-local
    container_name: uasam-container
    ports:
      - "8002:8080"
    env_file:
      - ../env/local-env.env
    volumes:
      - ..:/app
    restart: unless-stopped
    depends_on:
      - uasam-postgres
      - uasam-redis

  uasam-postgres:
    image: postgres:17
    container_name: uasam-postgres-container
    env_file:
      - ../env/local-env.env
    volumes:
      - uasam_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  uasam-redis:
    image: redis:7
    container_name: uasam-redis-container
    command: ["redis-server", "--requirepass", "password"]
    ports:
      - "6379:6379"

volumes:
  uasam_pgdata:
