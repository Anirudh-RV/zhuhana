apiVersion: apps/v1
kind: Deployment
metadata:
  name: algonexus-tabix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: algonexus-tabix
  template:
    metadata:
      labels:
        app: algonexus-tabix
    spec:
      containers:
        - name: tabix
          image: spoonest/clickhouse-tabix-web-client:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: algonexus-tabix
spec:
  selector:
    app: algonexus-tabix
  ports:
    - port: 8124
      targetPort: 80
