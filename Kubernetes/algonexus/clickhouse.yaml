apiVersion: apps/v1
kind: Deployment
metadata:
  name: algonexus-clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: algonexus-clickhouse
  template:
    metadata:
      labels:
        app: algonexus-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:latest
          ports:
            - containerPort: 8123
            - containerPort: 9000
          env:
            - name: CLICKHOUSE_DB
              value: "algonexus"
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              value: "password"
---
apiVersion: v1
kind: Service
metadata:
  name: algonexus-clickhouse
spec:
  selector:
    app: algonexus-clickhouse
  ports:
    - name: http
      port: 8123
    - name: native
      port: 9000
