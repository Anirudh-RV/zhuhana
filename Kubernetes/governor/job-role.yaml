apiVersion: v1
kind: Namespace
metadata:
  name: user-algorithm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-creator
  namespace: user-algorithm
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-creator-binding
  namespace: user-algorithm
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default # <- The governor pod runs under this
roleRef:
  kind: Role
  name: job-creator
  apiGroup: rbac.authorization.k8s.io
