services:
  tasks-db:
    image: postgres
    volumes:
      - ./data/db:/var/lib/postgresql/data
    env_file:
      - "../env/local.env"
    expose:
      - "5433"
    ports:
      - "5433:5432"
  tasks:
    build:
      context: "../"
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./:/code
    ports:
      - "8001:8000"
    env_file:
      - "../env/local.env"
    depends_on:
      - tasks-db

volumes:
  postgres_data:
